<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket Verified - Team Designated</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f0f1a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .container {
            width: 100%;
            max-width: 420px;
        }

        /* Verified Banner */
        .verified-banner {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px;
            background: rgba(34, 197, 94, 0.12);
            border: 2px solid #22c55e;
            border-radius: 14px;
            margin-bottom: 20px;
        }
        .verified-banner svg { width: 30px; height: 30px; color: #22c55e; }
        .verified-banner span {
            font-size: 22px;
            font-weight: 800;
            color: #22c55e;
            letter-spacing: 3px;
        }

        /* Ticket Card — mirrors the PDF layout */
        .ticket {
            background: #1a1a2e;
            border-radius: 14px;
            border: 1.5px solid #444;
            overflow: hidden;
            position: relative;
        }

        .ticket-main {
            padding: 24px 22px 20px;
        }

        .show-name {
            font-size: 22px;
            font-weight: 800;
            color: #fff;
            line-height: 1.2;
        }
        .show-subtitle {
            font-size: 13px;
            color: #aaa;
            margin-top: 4px;
        }

        .category-badge {
            display: inline-block;
            padding: 5px 16px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 2px;
            margin-top: 14px;
        }
        .cat-PLATINUM { background: #C0C0C0; color: #1a1a2e; }
        .cat-GOLD { background: #FFD700; color: #1a1a2e; }
        .cat-SILVER { background: #C0C0C0; color: #1a1a2e; }
        .cat-BALCONY { background: #E8975E; color: #1a1a2e; }

        /* Details Grid — same as PDF */
        .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px 20px;
            margin-top: 20px;
        }
        .detail-item .label {
            font-size: 10px;
            color: #888899;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 3px;
        }
        .detail-item .value {
            font-size: 14px;
            font-weight: 700;
            color: #fff;
        }

        /* Dashed separator */
        .separator {
            border: none;
            border-top: 2px dashed #333;
            margin: 0;
            position: relative;
        }
        .separator::before, .separator::after {
            content: '';
            position: absolute;
            top: -9px;
            width: 16px;
            height: 16px;
            background: #0f0f1a;
            border-radius: 50%;
        }
        .separator::before { left: -9px; }
        .separator::after { right: -9px; }

        /* Footer */
        .ticket-footer {
            padding: 14px 22px;
            text-align: center;
        }
        .ticket-id {
            font-size: 11px;
            color: #555566;
            letter-spacing: 1px;
        }

        /* Organizer */
        .organizer {
            text-align: center;
            margin-top: 18px;
            color: #555;
            font-size: 11px;
            letter-spacing: 1px;
        }

        /* Error state */
        .error-card {
            display: none;
            text-align: center;
            padding: 40px 20px;
            background: #1a1a2e;
            border-radius: 14px;
            border: 2px solid #ef4444;
        }
        .error-card svg { width: 50px; height: 50px; color: #ef4444; margin-bottom: 16px; }
        .error-card h2 { color: #ef4444; font-size: 20px; letter-spacing: 2px; }
        .error-card p { color: #888; margin-top: 8px; font-size: 13px; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Verified Banner -->
        <div class="verified-banner" id="verifiedBanner" style="display:none;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                <polyline points="22 4 12 14.01 9 11.01"/>
            </svg>
            <span>VERIFIED</span>
        </div>

        <!-- Ticket Card -->
        <div class="ticket" id="ticketCard" style="display:none;">
            <div class="ticket-main">
                <div class="show-name" id="showName"></div>
                <div class="show-subtitle" id="showSubtitle"></div>
                <div id="categoryContainer"></div>

                <div class="details-grid">
                    <div class="detail-item">
                        <div class="label">GUEST NAME</div>
                        <div class="value" id="guestName"></div>
                    </div>
                    <div class="detail-item">
                        <div class="label">DATE</div>
                        <div class="value" id="showDate"></div>
                    </div>
                    <div class="detail-item">
                        <div class="label">TIME</div>
                        <div class="value" id="showTime"></div>
                    </div>
                    <div class="detail-item">
                        <div class="label">VENUE</div>
                        <div class="value" id="showVenue"></div>
                    </div>
                </div>
            </div>

            <hr class="separator">

            <div class="ticket-footer">
                <div class="ticket-id" id="ticketId"></div>
            </div>
        </div>

        <!-- Organizer -->
        <div class="organizer" id="orgText" style="display:none;"></div>

        <!-- Error Card -->
        <div class="error-card" id="errorCard">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                <circle cx="12" cy="12" r="10"/>
                <line x1="15" y1="9" x2="9" y2="15"/>
                <line x1="9" y1="9" x2="15" y2="15"/>
            </svg>
            <h2>INVALID TICKET</h2>
            <p>This QR code could not be verified.</p>
        </div>
    </div>

    <script>
        // Read ticket data from URL hash
        // QR encodes: verify.html#BASE64_JSON
        window.addEventListener('DOMContentLoaded', () => {
            const hash = window.location.hash.substring(1);
            if (!hash) {
                document.getElementById('errorCard').style.display = 'block';
                return;
            }

            let data;
            try {
                const json = decodeURIComponent(atob(hash));
                data = JSON.parse(json);
            } catch (e) {
                document.getElementById('errorCard').style.display = 'block';
                return;
            }

            // Show verified
            document.getElementById('verifiedBanner').style.display = 'flex';
            document.getElementById('ticketCard').style.display = 'block';

            // Fill ticket
            document.getElementById('showName').textContent = data.show || '-';
            document.getElementById('showSubtitle').textContent = 'ft. ' + (data.artist || 'Ravi Gupta');
            document.getElementById('guestName').textContent = data.name || '-';
            document.getElementById('showDate').textContent = data.date || '-';
            document.getElementById('showTime').textContent = data.time || '-';
            document.getElementById('showVenue').textContent = data.venue || '-';
            document.getElementById('ticketId').textContent = 'Ticket ID: ' + (data.id || '-');

            // Category badge
            const cat = (data.cat || '').toUpperCase();
            const catDiv = document.getElementById('categoryContainer');
            catDiv.innerHTML = `<span class="category-badge cat-${cat}">${cat}</span>`;

            // Set border color to match category
            const colors = { PLATINUM: '#C0C0C0', GOLD: '#FFD700', SILVER: '#C0C0C0', BALCONY: '#E8975E' };
            const borderColor = colors[cat] || '#444';
            document.querySelector('.ticket').style.borderColor = borderColor;

            // Organizer
            if (data.org) {
                const orgEl = document.getElementById('orgText');
                orgEl.textContent = 'Organized by ' + data.org;
                orgEl.style.display = 'block';
            }
        });
    </script>
</body>
</html>
